workflows:
  build-dylib:
    name: Build libbabel_menu.dylib
    max_build_duration: 10
    instance_type: mac_mini_m1

    scripts:
      - name: List files
        script: ls -la $CM_BUILD_DIR

      - name: Rename header
        script: |
          cd $CM_BUILD_DIR
          mv "babel_menu (2).h" babel_menu.h 2>/dev/null || true
          ls -la

      - name: Compile dylib
        script: |
          cd $CM_BUILD_DIR
          clang -dynamiclib -fPIC -fobjc-arc -O2 \
            -I. \
            -framework Metal \
            -framework Cocoa \
            -framework QuartzCore \
            -o libbabel_menu.dylib \
            babel_overlay.m babel_menu.c -lm

    artifacts:
      - $CM_BUILD_DIR/libbabel_menu.dylib
