workflows:
  build-dylib:
    name: Build libbabel_menu.dylib
    max_build_duration: 10
    instance_type: mac_mini_m1

    scripts:
      - name: Compile dylib
        script: |
          clang -dynamiclib -fPIC -fobjc-arc -O2 \
            -framework Metal \
            -framework Cocoa \
            -framework QuartzCore \
            -o libbabel_menu.dylib \
            babel_overlay.m babel_menu.c -lm

    artifacts:
      - libbabel_menu.dylib
