workflows:
  build-dylib:
    name: Build libbabel_menu.dylib
    max_build_duration: 10
    instance_type: mac_mini_m1

    scripts:
      - name: List files
        script: ls -la

      - name: Compile dylib
        script: |
          clang -dynamiclib -fPIC -fobjc-arc -O2 \
            -framework Metal \
            -framework Cocoa \
            -framework QuartzCore \
            -o $CM_BUILD_DIR/libbabel_menu.dylib \
            $CM_BUILD_DIR/babel_overlay.m $CM_BUILD_DIR/babel_menu.c -lm

    artifacts:
      - $CM_BUILD_DIR/libbabel_menu.dylib
